apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.wildcardCertificate.name }}
  namespace: {{ .Values.wildcardCertificate.namespace }}
spec:
  secretName: {{ .Values.wildcardCertificate.name }}
  duration: {{ .Values.wildcardCertificate.duration }}
  renewBefore: {{ .Values.wildcardCertificate.renewBefore }}
  subject:
    organizations: 
      - {{ .Values.wildcardCertificate.subjectOrganization }}
  commonName: {{ .Values.wildcardCertificate.commonName | quote }}
  dnsNames:
{{- range .Values.wildcardCertificate.dnsNames }}
    - {{ . | quote }}
{{- end }}
  issuerRef:
    name: {{ .Values.clusterIssuer.name }}
    kind: ClusterIssuer

