apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.rootCA.issuerName }}
  namespace: {{ .Values.rootCA.namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.rootCA.certificateName }}
  namespace: {{ .Values.rootCA.namespace }}
spec:
  isCA: true
  commonName: {{ .Values.rootCA.certificateCommonName }}
  secretName: {{ .Values.rootCA.certificateSecretName }}
  duration: {{ .Values.rootCA.duration | quote }}
  renewBefore: {{ .Values.rootCA.renewBefore | quote }}
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.rootCA.issuerName }}
    kind: Issuer

