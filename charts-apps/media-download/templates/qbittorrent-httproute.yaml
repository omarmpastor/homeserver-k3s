apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.qbittorrent.appName }}-route

spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kube-system

  hostnames:
  - {{ printf "%s.%s" .Values.qbittorrent.appName .Values.httpRoute.domain | quote }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
      - name: {{ .Values.qbittorrent.appName }}-svc
        port:  {{ .Values.qbittorrent.service.targetPort }}
