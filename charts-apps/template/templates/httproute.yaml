apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mi-chart.name" . }}-route

spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kube-system

  hostnames:
  - {{ printf "%s.%s" (include "mi-chart.name" .) .Values.httpRoute.domain | quote }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
      - name: {{ include "mi-chart.name" . }}-svc
        port:  {{ .Values.service.targetPort }}
