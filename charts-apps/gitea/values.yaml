replicaCount: 1

image:
  repository: "docker.gitea.com/gitea"
  pullPolicy: IfNotPresent
  tag: "1.25.5"

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  portHttpName: http

httpRoute:
  parentRefs:
    - name: cluster-gateway
      namespace: kube-system
  
  domain: "omp.home"

pvc:
  storageSize: 1Gi

storage:
  mountPathConfig: "/data"
  localStoragePath: "/mnt/storage"
