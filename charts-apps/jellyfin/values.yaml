replicaCount: 1

image:
  repository: "lscr.io/linuxserver/jellyfin"
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8096
  targetPort: 8096
  portHttpName: http

httpRoute:
  parentRefs:
    - name: cluster-gateway
      namespace: kube-system
  
  domain: "omp.home"

pvc:
  storageSize: 5Gi

storage:
  mountPathConfig: "/config"
  localStoragePath: "/mnt/storage"
